<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UPDATING — BEDROCK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0e1219;
      --surface: #161d28;
      --border:  #283548;
      --blue:    #2e86c1;
      --blue-hi: #4aa8e8;
      --green:   #28b858;
      --red:     #d94030;
      --amber:   #f0aa28;
      --text:    #dce8f8;
      --dim:     #8098b8;
      --mono:    'Share Tech Mono', monospace;
      --sans:    'Barlow Condensed', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .stage {
      width: 100%;
      max-width: 960px;
      padding: 32px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    /* ── Header ── */
    .header-row {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .wordmark {
      font-family: var(--mono);
      font-size: 0.85rem;
      letter-spacing: 0.3em;
      color: var(--dim);
      text-transform: uppercase;
    }

    .sep {
      width: 1px;
      height: 24px;
      background: var(--border);
    }

    .status-title {
      font-family: var(--sans);
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text);
    }

    .status-title.done  { color: var(--green); }
    .status-title.error { color: var(--red); }

    /* ── Progress bar ── */
    .bar-wrap {
      width: 100%;
      height: 64px;
      border-radius: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      width: 5%;
      min-width: 64px;
      border-radius: 32px;
      background: var(--blue);
      transition: width 0.9s cubic-bezier(0.4, 0, 0.2, 1),
                  background-color 0.5s ease;
      position: relative;
      overflow: hidden;
    }

    .bar-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.28), transparent);
      animation: shimmer 1.6s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%   { left: -60%; }
      100% { left: 160%; }
    }

    .bar-fill.done {
      background: var(--green);
    }

    .bar-fill.done::after,
    .bar-fill.error::after {
      animation: none;
    }

    .bar-fill.error {
      background: var(--red);
    }

    /* ── Log line ── */
    .log-line {
      font-family: var(--mono);
      font-size: 1rem;
      color: var(--dim);
      text-align: center;
      min-height: 1.4em;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      animation: fadeUp 0.25s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Warning banner ── */
    .warning {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(240, 170, 40, 0.1);
      border: 1px solid var(--amber);
      border-radius: 12px;
      padding: 14px 22px;
      width: 100%;
    }

    .warning-icon {
      font-size: 1.6rem;
      flex-shrink: 0;
    }

    .warning-text {
      font-family: var(--sans);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--amber);
      letter-spacing: 0.05em;
      line-height: 1.4;
    }

    /* ── Done button ── */
    .done-btn {
      display: none;
      padding: 22px 64px;
      background: var(--blue);
      color: #fff;
      font-family: var(--sans);
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .done-btn:hover  { background: var(--blue-hi); transform: scale(1.03); }
    .done-btn:active { transform: scale(0.98); }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── Footer link ── */
    .footer {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--border);
      text-decoration: none;
      letter-spacing: 0.1em;
    }
    .footer:hover { color: var(--dim); }
  </style>
</head>
<body>

<div class="stage">

  <div class="header-row">
    <span class="wordmark">BEDROCK</span>
    <div class="sep"></div>
    <div class="status-title" id="statusTitle">UPDATING SYSTEM</div>
  </div>

  <div class="bar-wrap">
    <div class="bar-fill" id="barFill"></div>
  </div>

  <div class="log-line" id="logLine">Connecting to Bedrock...</div>

  <div class="warning">
    <span class="warning-icon">⚠️</span>
    <span class="warning-text">Do not power off the device &nbsp;·&nbsp; Keep connected to the internet</span>
  </div>

  <a class="done-btn" id="doneBtn" href="http://localhost:5173">
    GO TO APP &rarr;
  </a>


</div>

<script src="/socket.io/socket.io.js"></script>
<script>
(function () {
  'use strict';

  const barFill     = document.getElementById('barFill');
  const logLine     = document.getElementById('logLine');
  const statusTitle = document.getElementById('statusTitle');
  const doneBtn     = document.getElementById('doneBtn');

  let pct    = 5;
  let isDone = false;

  // Show the button after 4 minutes regardless
  const fallbackTimer = setTimeout(() => {
    if (!isDone) {
      setLog('This is taking longer than expected — you can try the app now.');
      doneBtn.style.display = 'inline-block';
    }
  }, 8 * 60 * 1000);

  const socket = io({ reconnectionDelay: 1500, reconnectionDelayMax: 8000 });

  socket.on('connect', () => {
    setLog('Connected — waiting for operation...');
  });

  socket.on('disconnect', (reason) => {
    if (!isDone) setLog(`Disconnected: ${reason}`);
  });

  // ── Status events ─────────────────────────────────────────────────────────

  socket.on('status', (s) => {
    if (isDone) return;

    switch (s.status) {

      case 'cloning':
        nudge(5, 10);
        setLog(s.progress || 'Cloning repository...');
        break;

      case 'repo-exists':
        nudge(5, 10);
        setLog(s.progress || 'Repository already cloned.');
        break;

      case 'cloning-complete':
        nudge(15, 15);
        setLog(s.progress || 'Clone complete.');
        break;

      case 'downloading':
        nudge(20, 48, 0.8);
        setLog(s.progress ? `[dl] ${s.progress}` : `Downloading ${s.tag || ''}...`);
        break;

      case 'pulling-containers':
        nudge(50, 78, 0.6);
        setLog(s.progress ? `[pull] ${s.progress}` : 'Pulling containers...');
        break;

      case 'pulling-containers-complete':
        setBar(82);
        setLog(`Pull complete: ${s.tag || ''}`);
        break;

      case 'download-complete':
        setBar(90);
        setLog(`Download complete: ${s.tag || ''}`);
        break;

      case 'soft-restarting':
        nudge(90, 97, 0.4);
        setLog(s.progress ? `[up] ${s.progress}` : 'Starting containers...');
        break;

      case 'soft-restarting-complete':
        setBar(99);
        setLog('Preparing...');
        setTimeout(() => finish('SYSTEM READY', 'done'), 5000);
        break;

      case 'stopping':
        nudge(10, 90, 1.2);
        setLog(s.progress ? `[stop] ${s.progress}` : 'Stopping stack...');
        break;

      case 'stopped':
        finish('STACK STOPPED', 'done');
        break;

      case 'download-failed':
      case 'pulling-containers-failed':
        setError(`Failed: ${s.reason || s.status}`);
        break;

      case 'error':
        setError(`Error: ${s.reason || 'unknown'}`);
        break;

      default:
        if (s.progress) setLog(s.progress);
        break;
    }
  });

  // ── Helpers ───────────────────────────────────────────────────────────────

  function nudge(floor, cap, step = 1) {
    if (pct < floor) pct = floor;
    pct = Math.min(pct + step, cap);
    setBar(pct);
  }

  function setBar(p) {
    pct = p;
    barFill.style.width = p + '%';
  }

  function setLog(msg) {
    if (!msg) return;
    logLine.style.animation = 'none';
    void logLine.offsetWidth;
    logLine.style.animation = '';
    logLine.textContent = msg;
  }

  function finish(title, state) {
    isDone = true;
    clearTimeout(fallbackTimer);
    setBar(100);
    barFill.classList.remove('error');
    barFill.classList.add(state);
    statusTitle.textContent = title;
    statusTitle.className   = `status-title ${state}`;
    setLog('Ready.');
    doneBtn.style.display = 'inline-block';
  }

  function setError(msg) {
    barFill.classList.add('error');
    statusTitle.textContent = 'UPDATE FAILED';
    statusTitle.className   = 'status-title error';
    setLog(msg);
  }

})();
</script>

</body>
</html>
