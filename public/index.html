<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BEDROCK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e1219;
      --surface:   #161d28;
      --border:    #283548;
      --border-hi: #3d5470;
      --amber:     #f0aa28;
      --amber-dim: #7a5418;
      --red:       #d94030;
      --green:     #28b858;
      --blue:      #2e86c1;
      --text:      #dce8f8;
      --text-dim:  #8098b8;
      --mono:      'Share Tech Mono', monospace;
      --sans:      'Barlow Condensed', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 16px;
      letter-spacing: 0.01em;
    }

    /* ── Layout ── */
    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      border-bottom: 2px solid var(--amber);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 20px;
      background: var(--surface);
    }

    .logo {
      font-family: var(--mono);
      font-size: 1.5rem;
      color: var(--amber);
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }
    .logo span { color: var(--text-dim); font-size: 0.75rem; letter-spacing: 0.1em; display: block; margin-top: 2px; }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }

    .version-pill {
      font-family: var(--mono);
      font-size: 0.7rem;
      padding: 4px 12px;
      border: 1px solid var(--border-hi);
      border-radius: 2px;
      color: var(--text-dim);
    }
    .version-pill.has-version { color: var(--amber); border-color: var(--amber-dim); }

    .conn-pill {
      font-family: var(--mono);
      font-size: 0.7rem;
      padding: 4px 12px;
      border: 1px solid currentColor;
      border-radius: 2px;
    }
    .conn-pill.connected    { color: var(--green); }
    .conn-pill.disconnected { color: var(--red); }

    main {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 0;
    }

    /* ── Sidebar ── */
    .sidebar {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .panel {
      border-bottom: 1px solid var(--border);
      padding: 18px 22px;
    }

    .panel-title {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border-hi);
      background: transparent;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      margin-bottom: 8px;
    }
    .btn:last-child { margin-bottom: 0; }
    .btn:hover:not(:disabled) { border-color: var(--amber); color: var(--amber); background: rgba(240,170,40,0.07); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn.danger:hover:not(:disabled)  { border-color: var(--red);   color: var(--red);   background: rgba(217,64,48,0.08); }
    .btn.primary:hover:not(:disabled) { border-color: var(--green); color: var(--green); background: rgba(40,184,88,0.08); }

    .btn-icon { font-size: 1rem; flex-shrink: 0; }

    /* ── Tag List ── */
    .tag-list {
      max-height: 260px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border-hi) transparent;
    }
    .tag-list::-webkit-scrollbar { width: 4px; }
    .tag-list::-webkit-scrollbar-track { background: transparent; }
    .tag-list::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

    .tag-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid transparent;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text-dim);
      transition: all 0.12s;
      margin-bottom: 3px;
    }
    .tag-item:hover   { border-color: var(--border-hi); color: var(--text); background: rgba(255,255,255,0.04); }
    .tag-item.selected { border-color: var(--amber-dim); color: var(--amber); background: rgba(240,170,40,0.09); }

    .tag-dot  { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .tag-live {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--green);
      border: 1px solid var(--green);
      padding: 1px 5px;
      border-radius: 1px;
      margin-left: auto;
    }

    .tag-actions {
      display: flex;
      gap: 6px;
      margin-top: 12px;
    }
    .tag-actions .btn { flex: 1; margin-bottom: 0; font-size: 0.65rem; padding: 8px 6px; }

    .tag-empty {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--text-dim);
      padding: 12px 0;
      text-align: center;
    }

    /* ── Log ── */
    .log-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .log-header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
    }

    .log-title {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .log-badge {
      font-family: var(--mono);
      font-size: 0.65rem;
      padding: 2px 8px;
      border: 1px solid currentColor;
      border-radius: 1px;
      margin-left: auto;
    }
    .log-badge.idle    { color: var(--text-dim); }
    .log-badge.working { color: var(--amber); }
    .log-badge.success { color: var(--green); }
    .log-badge.fail    { color: var(--red); }

    .log-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 20px 28px;
      scrollbar-width: thin;
      scrollbar-color: var(--border-hi) transparent;
    }
    .log-scroll::-webkit-scrollbar { width: 4px; }
    .log-scroll::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

    .log-entry {
      font-family: var(--mono);
      font-size: 0.72rem;
      line-height: 1.6;
      margin-bottom: 4px;
      display: flex;
      gap: 12px;
    }
    .log-ts  { color: var(--text-dim); flex-shrink: 0; }
    .log-msg { flex: 1; word-break: break-all; }

    .log-entry.info    .log-msg { color: var(--text); }
    .log-entry.success .log-msg { color: var(--green); }
    .log-entry.error   .log-msg { color: var(--red); }
    .log-entry.warn    .log-msg { color: var(--amber); }
    .log-entry.dim     .log-msg { color: var(--text-dim); }

    /* ── Animations ── */
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .blinking { animation: pulse 1.1s ease-in-out infinite; }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      main { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>
<div class="shell">
  <header>
    <div class="logo">
      BEDROCK
      <span>deployment control</span>
    </div>
    <div class="header-meta">
      <div id="versionPill" class="version-pill">DEPLOYED: —</div>
      <div id="connPill" class="conn-pill disconnected">● DISCONNECTED</div>
    </div>
  </header>

  <main>
    <!-- ── Sidebar ── -->
    <aside class="sidebar">

      <!-- Repository -->
      <div class="panel">
        <div class="panel-title">// repository</div>
        <button class="btn" id="btnRefresh">
          <span class="btn-icon">⟳</span> FETCH TAGS
        </button>
      </div>

      <!-- Tag list -->
      <div class="panel" style="flex:1; overflow:hidden; display:flex; flex-direction:column;">
        <div class="panel-title">// versions</div>
        <div class="tag-list" id="tagList">
          <div class="tag-empty">— fetch tags to populate —</div>
        </div>
        <div class="tag-actions">
          <button class="btn primary" id="btnDownload" disabled>
            ↓ DOWNLOAD
          </button>
          <button class="btn danger" id="btnUpgrade" disabled>
            ↑ DEPLOY
          </button>
        </div>
      </div>

      <!-- Operations -->
      <div class="panel">
        <div class="panel-title">// operations</div>
        <button class="btn" id="btnGetVersion">
          <span class="btn-icon">?</span> CHECK VERSION
        </button>
        <button class="btn" id="btnRestart">
          <span class="btn-icon">↺</span> SOFT RESTART
        </button>
        <button class="btn danger" id="btnStop">
          <span class="btn-icon">■</span> STOP PRODUCTION
        </button>
      </div>

    </aside>

    <!-- ── Log pane ── -->
    <section class="log-area">
      <div class="log-header">
        <div class="log-title">// activity log</div>
        <button class="btn" style="width:auto;margin:0;padding:4px 12px;font-size:0.65rem;" id="btnClear">CLEAR</button>
        <div class="log-badge idle" id="statusBadge">IDLE</div>
      </div>
      <div class="log-scroll" id="logScroll"></div>
    </section>
  </main>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
(function () {
  'use strict';

  // ── State ─────────────────────────────────────────────────────────────────
  let selectedTag    = null;
  let isBusy         = false;
  let currentVersion = null;
  const tags         = [];

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const connPill    = document.getElementById('connPill');
  const versionPill = document.getElementById('versionPill');
  const tagList     = document.getElementById('tagList');
  const btnRefresh  = document.getElementById('btnRefresh');
  const btnDownload = document.getElementById('btnDownload');
  const btnUpgrade  = document.getElementById('btnUpgrade');
  const btnRestart  = document.getElementById('btnRestart');
  const btnStop     = document.getElementById('btnStop');
  const btnGetVersion = document.getElementById('btnGetVersion');
  const btnClear    = document.getElementById('btnClear');
  const logScroll   = document.getElementById('logScroll');
  const statusBadge = document.getElementById('statusBadge');

  // ── Socket ────────────────────────────────────────────────────────────────
  const socket = io({ reconnectionDelay: 1500, reconnectionDelayMax: 8000 });

  socket.on('connect', () => {
    connPill.textContent = '● CONNECTED';
    connPill.className   = 'conn-pill connected';
    log('Connected to Bedrock.', 'success');
    socket.emit('get_version');
  });

  socket.on('disconnect', (reason) => {
    connPill.textContent = '● DISCONNECTED';
    connPill.className   = 'conn-pill disconnected';
    log(`Disconnected: ${reason}`, 'error');
    setBusy(false);
  });

  socket.on('connect_error', (err) => {
    log(`Connection error: ${err.message}`, 'error');
  });

  // ── Version ───────────────────────────────────────────────────────────────
  socket.on('version', ({ tag }) => {
    currentVersion = tag;
    if (tag) {
      versionPill.textContent = `DEPLOYED: ${tag}`;
      versionPill.classList.add('has-version');
      log(`Current deployed version: ${tag}`, 'info');
    } else {
      versionPill.textContent = 'DEPLOYED: —';
      versionPill.classList.remove('has-version');
      log('No version deployed (repo not cloned or HEAD not on a tag).', 'dim');
    }
    renderTags();
  });

  // ── Tags ──────────────────────────────────────────────────────────────────
  socket.on('tags', (incoming) => {
    tags.length = 0;
    tags.push(...(Array.isArray(incoming) ? incoming : []));
    renderTags();
    setBusy(false);
    log(`Received ${tags.length} tag(s).`, 'info');
  });

  // ── Status ────────────────────────────────────────────────────────────────
  socket.on('status', (s) => {
    switch (s.status) {
      case 'cloning':
      case 'repo-exists':
        setStatusBadge('working', 'WORKING');
        log(s.progress || s.status, 'dim');
        break;

      case 'cloning-complete':
        log(s.progress || 'Clone complete.', 'success');
        break;

      case 'downloading':
        setStatusBadge('working', 'DOWNLOADING');
        log(`[${s.tag || '?'}] ${s.progress || ''}`, 'dim');
        break;

      case 'download-complete':
        setStatusBadge('success', 'DONE');
        log(`✓ Download complete: ${s.tag}`, 'success');
        setBusy(false);
        socket.emit('get_version');
        break;

      case 'download-failed':
        setStatusBadge('fail', 'FAILED');
        log(`✗ Download failed (${s.tag}): ${s.reason}`, 'error');
        setBusy(false);
        break;

      case 'pulling-containers':
        setStatusBadge('working', 'PULLING');
        log(`[pull] ${s.progress || ''}`, 'dim');
        break;

      case 'pulling-containers-complete':
        log(`✓ Pull complete: ${s.tag}`, 'success');
        break;

      case 'pulling-containers-failed':
        setStatusBadge('fail', 'FAILED');
        log(`✗ Pull failed (${s.tag}): ${s.reason}`, 'error');
        setBusy(false);
        break;

      case 'soft-restarting':
        setStatusBadge('working', 'RESTARTING');
        if (s.progress) log(`[restart] ${s.progress}`, 'dim');
        else log('Soft restarting...', 'warn');
        break;

      case 'soft-restarting-complete':
        setStatusBadge('success', 'DONE');
        log('✓ Soft restart complete.', 'success');
        setBusy(false);
        socket.emit('get_version');
        break;

      case 'stopping':
        setStatusBadge('working', 'STOPPING');
        if (s.progress) log(`[stop] ${s.progress}`, 'dim');
        else log('Stopping production stack...', 'warn');
        break;

      case 'stopped':
        setStatusBadge('success', 'STOPPED');
        log('✓ Production stack stopped.', 'success');
        setBusy(false);
        break;

      case 'error':
        setStatusBadge('fail', 'ERROR');
        log(`✗ Error: ${s.reason}`, 'error');
        setBusy(false);
        break;

      default:
        log(`[${s.status}] ${JSON.stringify(s)}`, 'dim');
    }
  });

  // ── UI Interactions ───────────────────────────────────────────────────────
  btnRefresh.addEventListener('click', () => {
    if (isBusy) return;
    setBusy(true);
    log('Fetching tags...', 'info');
    setStatusBadge('working', 'FETCHING');
    socket.emit('list_tags');
  });

  btnGetVersion.addEventListener('click', () => {
    log('Checking current version...', 'info');
    socket.emit('get_version');
  });

  btnDownload.addEventListener('click', () => {
    if (!selectedTag || isBusy) return;
    if (!confirm(`Download version ${selectedTag}?`)) return;
    setBusy(true);
    log(`Requesting download: ${selectedTag}`, 'info');
    socket.emit('download_tag', selectedTag);
  });

  btnUpgrade.addEventListener('click', () => {
    if (!selectedTag || isBusy) return;
    if (!confirm(`Download + deploy version ${selectedTag}?`)) return;
    setBusy(true);
    log(`Requesting deploy: ${selectedTag}`, 'warn');
    socket.emit('download_tag_and_soft_restart', selectedTag);
  });

  btnRestart.addEventListener('click', () => {
    if (isBusy) return;
    if (!confirm('Perform a soft restart now?')) return;
    setBusy(true);
    log('Requesting soft restart...', 'warn');
    socket.emit('soft_restart');
  });

  btnStop.addEventListener('click', () => {
    if (isBusy) return;
    if (!confirm('Stop the production stack? All containers will be removed.')) return;
    setBusy(true);
    log('Requesting production stop...', 'warn');
    socket.emit('stop');
  });

  btnClear.addEventListener('click', () => {
    logScroll.innerHTML = '';
  });

  // ── Tag Rendering ─────────────────────────────────────────────────────────
  function renderTags() {
    if (!tags.length) {
      tagList.innerHTML = '<div class="tag-empty">— no tags found —</div>';
      selectedTag = null;
      updateTagButtons();
      return;
    }

    tagList.innerHTML = '';
    for (const tag of tags) {
      const el        = document.createElement('div');
      const isLive    = tag === currentVersion;
      el.className    = 'tag-item' + (tag === selectedTag ? ' selected' : '');
      el.innerHTML    = `<div class="tag-dot"></div>${escHtml(tag)}`
                      + (isLive ? '<span class="tag-live">LIVE</span>' : '');
      el.addEventListener('click', () => selectTag(tag));
      tagList.appendChild(el);
    }
    updateTagButtons();
  }

  function selectTag(tag) {
    selectedTag = tag;
    renderTags();
    log(`Selected version: ${tag}`, 'info');
  }

  function updateTagButtons() {
    const hasSel = !!selectedTag && !isBusy;
    btnDownload.disabled = !hasSel;
    btnUpgrade.disabled  = !hasSel;
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function setBusy(busy) {
    isBusy = busy;
    btnRefresh.disabled   = busy;
    btnRestart.disabled   = busy;
    btnStop.disabled      = busy;
    btnGetVersion.disabled = busy;
    if (!busy) {
      setStatusBadge('idle', 'IDLE');
      updateTagButtons();
    } else {
      btnDownload.disabled = true;
      btnUpgrade.disabled  = true;
    }
  }

  function setStatusBadge(cls, text) {
    statusBadge.className   = `log-badge ${cls}`;
    statusBadge.textContent = text;
    if (cls === 'working') statusBadge.classList.add('blinking');
    else statusBadge.classList.remove('blinking');
  }

  function log(msg, level = 'info') {
    if (!msg || !msg.toString().trim()) return;
    const entry     = document.createElement('div');
    entry.className = `log-entry ${level}`;
    const ts        = new Date().toTimeString().slice(0, 8);
    entry.innerHTML = `<span class="log-ts">${ts}</span><span class="log-msg">${escHtml(msg.toString())}</span>`;
    logScroll.appendChild(entry);
    logScroll.scrollTop = logScroll.scrollHeight;

    while (logScroll.children.length > 1000) {
      logScroll.removeChild(logScroll.firstChild);
    }
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

})();
</script>
</body>
</html>
